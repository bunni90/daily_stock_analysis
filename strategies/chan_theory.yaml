instructions: |
  **缠论（Chan Theory / Zen Channel Theory）**

  核心框架：分型 → 笔 → 线段 → 中枢 → 趋势

  ## 分析步骤

  ### 1. 判断价格结构（中枢识别）
  - 使用 `get_daily_history` 获取近 60 日日线数据。
  - 识别近期价格的高低点序列，判断当前是否在
    **震荡中枢**（1个以上中枢）还是**趋势段**（脱离中枢向上/向下）。
  - 中枢：连续3段走势重叠区间，价格在此区间反复震荡。
  - 趋势：连续3个同级别中枢均向同一方向移动。

  ### 2. 背驰判断（最高优先级信号）
  - **顶背驰**：价格创新高但MACD红柱面积缩小 → 卖出/减仓信号。
  - **底背驰**：价格创新低但MACD绿柱面积缩小 → 买入/加仓信号。
  - 使用 `analyze_trend` 获取 MACD 数据，与价格高低点对比。

  ### 3. 买卖点判定
  - **一买**（最强）：下跌趋势中，最后一个中枢出现底背驰。
  - **二买**：离开下跌中枢后的第一次回调不破中枢高点。
  - **三买**：中枢震荡后向上突破（不回中枢内）。
  - **一卖/二卖/三卖**：对称结构，方向相反。
  - 当前价格所处的买卖点级别决定仓位大小。

  ### 4. 级别与仓位
  - 日线级别买卖点可用较重仓位 (30-50%)。
  - 周线级别买卖点可用较大仓位 (50-80%)。
  - 多级别共振（日线+周线同方向）时信号最强。

  ### 5. 输出要求
  - 明确说明当前处于：上涨趋势/下跌趋势/中枢震荡。
  - 指出是否存在背驰信号及背驰级别。
  - 给出当前买卖点类型（一买/二买/三买 等），若无则写"暂无明确买卖点"。
  - 止损设于前低（买入时）或前高（卖出时）。

  评分调整建议：
  - 底背驰 + 一买信号：`sentiment_score +15`
  - 二买/三买共振：`sentiment_score +10`
  - 中枢震荡无明确方向：`sentiment_score 维持基准`
  - 顶背驰 / 趋势向下：`sentiment_score -15`

instructions_en: |
  **Chan Theory / Zen Channel Theory**

  Core Framework: Fractal → Pen → Stroke → Segment → Pivot → Trend

  ## Analysis Steps

  ### 1. Price Structure Assessment (Pivot Identification)
  - Use `get_daily_history` to get 60 days of daily data.
  - Identify recent price high-low point sequences and determine whether the current state is
    **oscillating pivot** (1+ pivots) or **trend segment** (departing pivot upward/downward).
  - Pivot: Overlap zone of 3 consecutive price swings, price oscillates within this range.
  - Trend: 3 consecutive same-level pivots all moving in the same direction.

  ### 2. Divergence Judgment (Highest Priority Signal)
  - **Top Divergence**: Price makes new high but MACD red bar area shrinks → sell/reduce signal.
  - **Bottom Divergence**: Price makes new low but MACD green bar area shrinks → buy/add signal.
  - Use `analyze_trend` to get MACD data and compare with price high-low points.

  ### 3. Buy/Sell Point Determination
  - **First Buy** (strongest): In downtrend, bottom divergence appears at the last pivot.
  - **Second Buy**: First pullback after leaving the downside pivot does not break the pivot high.
  - **Third Buy**: Upward breakout after pivot oscillation (does not re-enter the pivot).
  - **First Sell / Second Sell / Third Sell**: Symmetrical structure, opposite direction.
  - The buy/sell point level at the current price determines position size.

  ### 4. Level & Position Sizing
  - Daily-level buy/sell points can use moderate positions (30-50%).
  - Weekly-level buy/sell points can use larger positions (50-80%).
  - Multi-level resonance (daily + weekly same direction) produces the strongest signal.

  ### 5. Output Requirements
  - Clearly state the current state: uptrend / downtrend / pivot oscillation.
  - Indicate whether divergence signals exist and at what level.
  - Provide the current buy/sell point type (First Buy / Second Buy / Third Buy, etc.), or write "no clear buy/sell point" if none.
  - Stop-loss set at prior low (for buys) or prior high (for sells).

  Scoring Adjustment Suggestions:
  - Bottom divergence + First Buy signal: `sentiment_score +15`
  - Second Buy / Third Buy resonance: `sentiment_score +10`
  - Pivot oscillation with no clear direction: `sentiment_score maintained at baseline`
  - Top divergence / trend downward: `sentiment_score -15`
