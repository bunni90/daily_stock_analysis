# Bottom Volume Surge Strategy / 底部放量
# After extended decline, price stabilizes and volume spikes. Potential reversal.

name: bottom_volume
display_name: 底部放量
display_name_en: "Bottom Volume Surge"
description: 检测长期下跌后底部放量信号，潜在趋势反转信号。
description_en: "Detects volume surge after prolonged decline. Potential trend reversal signal."
category: reversal
core_rules: [2, 5]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [地量见底, 底部放量]
default_priority: 60
market_regimes: [trending_down]

instructions: |
  **底部放量（Bottom Volume Surge Strategy）**

  反转判定标准：

  1. **持续下跌确认**：
     - 使用 `get_daily_history`（30日）。
     - 股价从 20 日高点到近期低点跌幅 > 15%。
     - `analyze_trend` → trend_status 应为 BEAR 或 STRONG_BEAR。

  2. **量能异动**：
     - 当日成交量 > 5 日均量的 3 倍。
     - 使用 `get_realtime_quote` → volume_ratio > 3.0。
     - 该异动应出现在前期极度缩量之后。

  3. **价格企稳**：
     - 当日K线收阳（收盘价 > 开盘价）。
     - 价格守住近期低点。
     - 最好出现长下影线，显示买方支撑。

  4. **确认因素**（关联理念5：风险排查）：
     - 通过 `search_stock_news` 确认是否有基本面催化。
     - 筹码分布：平均成本接近现价（成本收敛）。

  5. **风险提示**（关联理念2：趋势交易）：
     - 这是反转信号，风险高于趋势跟踪。
     - 仓位建议较小（最多 2-3 成）。
     - 止损必须严格（设在近期低点下方）。

  评分调整：
  - 底部放量确认：sentiment_score +8
  - 配合阳线 + 新闻催化：额外 +5
  - 在 `buy_reason` 和 `pattern_analysis` 中注明"底部放量"。
  - 止损设在近期低点。

instructions_en: |
  **Bottom Volume Surge Strategy**

  Reversal Determination Criteria:

  1. **Sustained Decline Confirmation**:
     - Use `get_daily_history` (30 days).
     - Stock price decline from 20-day high to recent low > 15%.
     - `analyze_trend` → trend_status should be BEAR or STRONG_BEAR.

  2. **Volume Anomaly**:
     - Daily volume > 3x the 5-day average volume.
     - Use `get_realtime_quote` → volume_ratio > 3.0.
     - The anomaly should appear after a period of extreme volume shrinkage.

  3. **Price Stabilization**:
     - Daily candle closes bullish (close > open).
     - Price holds above recent lows.
     - Preferably shows a long lower shadow, indicating buyer support.

  4. **Confirmation Factors** (related concept 5: risk screening):
     - Confirm via `search_stock_news` whether there is fundamental catalyst.
     - Chip distribution: average cost near current price (cost convergence).

  5. **Risk Warning** (related concept 2: trend trading):
     - This is a reversal signal, higher risk than trend following.
     - Position size recommendation smaller (maximum 20-30%).
     - Stop-loss must be strict (set below recent lows).

  Scoring Adjustments:
  - Bottom volume surge confirmed: sentiment_score +8
  - With bullish candle + news catalyst: additional +5
  - Note "Bottom volume surge" in `buy_reason` and `pattern_analysis`.
  - Stop-loss set at recent lows.
