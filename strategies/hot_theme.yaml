instructions: |
  **热点题材策略（Hot Theme Strategy）**

  适用场景：
  - 市场出现明确政策、产业、技术路线或资金抱团热点。
  - 需要判断个股是否真正受益于热点，而不是单纯蹭概念。

  分析框架：

  1. **热点强度**
     - 使用 `get_sector_rankings` 判断相关板块是否在近期涨幅、成交额或人气上处于前列。
     - 观察热点是否从少数核心股扩散到板块内多只个股。
     - 若只有单股异动、板块未共振，降低信号权重。

  2. **个股相关性**
     - 使用 `search_stock_news` 检查公司业务、订单、产能、客户、公告是否与热点直接相关。
     - 区分“实质受益”“间接受益”“概念关联较弱”。
     - 概念关联弱但涨幅过大时，应提示题材兑现风险。

  3. **相对强弱**
     - 使用 `get_realtime_quote` 与 `analyze_trend` 判断个股涨幅、量比、换手率是否强于板块平均。
     - 强势热点股通常表现为放量、换手活跃、回调不破关键均线。

  4. **节奏与风险**
     - 不在连续加速、高乖离率位置追涨。
     - 若新闻集中在“已经大涨”“资金追捧”“龙虎榜游资博弈”，需要警惕短线情绪顶。
     - 重大利空、监管问询、澄清公告可一票降低评级。

  输出要求：
  - 明确当前热点阶段：启动 / 扩散 / 分化 / 退潮。
  - 说明个股与热点的实质相关性。
  - 给出可执行触发条件：回踩承接、放量突破、板块继续共振或退潮止损。

  评分调整建议：
  - 热点处于启动或扩散期，且个股实质受益：`sentiment_score +12`
  - 个股强于板块并有量能确认：额外 `+6`
  - 热点进入分化或退潮：`sentiment_score -8`
  - 仅概念蹭热点且乖离率过高：`sentiment_score -12`

instructions_en: |
  **Hot Theme Strategy**

  Applicable Scenarios:
  - Clear policy, industry, technology roadmap, or capital clustering hotspot emerges in the market.
  - Need to determine whether a stock genuinely benefits from the hotspot, rather than merely riding on the concept.

  Analysis Framework:

  1. **Theme Strength**
     - Use `get_sector_rankings` to determine if the related sector is at the top in recent gains, turnover, or popularity.
     - Observe whether the hotspot has diffused from a few core stocks to multiple stocks within the sector.
     - If only a single stock moves without sector resonance, reduce signal weight.

  2. **Stock Relevance**
     - Use `search_stock_news` to check if the company's business, orders, capacity, customers, and announcements are directly related to the hotspot.
     - Distinguish between "substantially benefited," "indirectly benefited," and "weak concept association."
     - When concept association is weak but the price surge is excessive, alert on theme realization risk.

  3. **Relative Strength**
     - Use `get_realtime_quote` and `analyze_trend` to determine if the stock's gains, volume ratio, and turnover rate are stronger than the sector average.
     - Strong hotspot stocks typically show volume expansion, active turnover, and pullbacks holding above key MAs.

  4. **Rhythm & Risk**
     - Do not chase at consecutive acceleration with high deviation rate.
     - If news focuses on "already surged," "capital chasing," or "dragon-tiger board retail speculation," be alert for short-term sentiment peaks.
     - Major negative news, regulatory inquiries, or clarification announcements can single-handedly downgrade the rating.

  Output Requirements:
  - Clearly state the current theme stage: Launch / Diffusion / Differentiation / Retreat.
  - Explain the stock's substantive relevance to the theme.
  - Provide actionable trigger conditions: pullback absorption, volume breakout, continued sector resonance, or retreat stop-loss.

  Scoring Adjustment Suggestions:
  - Theme in launch or diffusion phase, and stock substantially benefits: `sentiment_score +12`
  - Stock outperforms sector with volume confirmation: additional `+6`
  - Theme enters differentiation or retreat: `sentiment_score -8`
  - Only concept-riding with excessive deviation: `sentiment_score -12`
