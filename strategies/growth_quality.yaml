instructions: |
  **成长质量策略（Growth Quality Strategy）**

  适用场景：
  - 关注公司中长期成长能力，而不是只看短线技术形态。
  - 适合高景气行业、业绩持续改善或商业模式扩张阶段的公司。

  分析框架：

  1. **成长性**
     - 优先查看财报字段中的营业收入、归母净利润、经营现金流和 ROE。
     - 判断收入增长和利润增长是否同向，是否存在“增收不增利”。
     - 若只有概念热度但财报尚未验证，应降低成长确定性。

  2. **质量**
     - ROE 越高且稳定，质量越好。
     - 经营现金流与净利润方向一致，说明盈利质量更可靠。
     - 现金流显著弱于利润时，要提示回款、存货或应收风险。

  3. **估值承受力**
     - 使用 PE/PB、市值等估值字段判断市场是否已经提前透支成长。
     - 高成长可承受更高估值，但必须说明增长能否覆盖估值。
     - 估值高且成长放缓时，应明显下调评分。

  4. **趋势确认**
     - 使用 `analyze_trend` 判断长期成长逻辑是否被市场资金确认。
     - 基本面向好但技术面未确认时，优先给观察条件而不是直接追买。

  输出要求：
  - 明确公司处于：高质量成长 / 成长验证中 / 成长放缓 / 成长证伪。
  - 说明成长来自收入扩张、利润率改善、行业景气，还是一次性因素。
  - 给出适合成长股的买点：业绩验证后突破、回踩长期均线或估值回落。

  评分调整建议：
  - 收入、利润、现金流和 ROE 同向改善：`sentiment_score +15`
  - 行业景气与公司新闻互相验证：额外 `+6`
  - 高估值但成长未验证：`sentiment_score -8`
  - 增收不增利或现金流恶化：`sentiment_score -12`

instructions_en: |
  **Growth Quality Strategy**

  Applicable Scenarios:
  - Focusing on the company's medium-to-long-term growth capability, not just short-term technical patterns.
  - Suitable for high-prosperity industries, companies with continuously improving earnings, or those in business model expansion phases.

  Analysis Framework:

  1. **Growth**
     - Prioritize reviewing financial report fields for revenue, net profit attributable to parent, operating cash flow, and ROE.
     - Determine if revenue growth and profit growth are aligned; check for "revenue growth without profit growth."
     - If only concept hype exists without financial report verification, lower growth certainty.

  2. **Quality**
     - Higher and stable ROE indicates better quality.
     - Operating cash flow aligned with net profit direction means earnings quality is more reliable.
     - When cash flow significantly lags profit, flag collection, inventory, or receivables risk.

  3. **Valuation Tolerance**
     - Use PE/PB, market cap and other valuation fields to judge whether the market has already front-loaded the growth.
     - High growth can sustain higher valuations, but must explain whether growth can cover the valuation.
     - High valuation with slowing growth should significantly lower the score.

  4. **Trend Confirmation**
     - Use `analyze_trend` to determine if the long-term growth thesis is confirmed by market capital.
     - When fundamentals are improving but technicals are unconfirmed, prioritize providing observation conditions rather than directly chasing buys.

  Output Requirements:
  - Clearly state the company's status: High-quality growth / Growth under verification / Growth slowing / Growth disproven.
  - Explain whether growth comes from revenue expansion, margin improvement, industry prosperity, or one-off factors.
  - Provide suitable entry points for growth stocks: post-earnings breakout, pullback to long-term MA, or valuation retreat.

  Scoring Adjustment Suggestions:
  - Revenue, profit, cash flow, and ROE all improving in sync: `sentiment_score +15`
  - Industry prosperity and company news mutually verified: additional `+6`
  - High valuation but growth unverified: `sentiment_score -8`
  - Revenue growth without profit growth or deteriorating cash flow: `sentiment_score -12`
