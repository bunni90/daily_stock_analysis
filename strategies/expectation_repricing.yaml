instructions: |
  **预期重估策略（Expectation Repricing Strategy）**

  适用场景：
  - 市场对公司业绩、政策、行业景气、估值中枢或竞争格局的预期正在变化。
  - 需要判断当前价格反映的是“预期修复”“预期落空”还是“预期过热”。

  分析框架：

  1. **预期来源**
     - 使用 `search_stock_news` 识别近期改变市场预期的信息：业绩预告、机构观点、订单、政策、产品进展、行业数据。
     - 区分硬信息（公告、财报、订单）和软信息（传闻、观点、情绪）。

  2. **预期差方向**
     - 正向预期差：市场原本悲观，新增信息显示业务或业绩好于预期。
     - 负向预期差：市场原本乐观，新增信息低于预期或验证失败。
     - 若信息已经被连续大涨充分反映，需要提示预期兑现风险。

  3. **估值重估**
     - 使用 PE/PB、市值、ROE、现金流等字段判断估值重估是否有基本面支撑。
     - 估值提升需要匹配盈利质量、增长持续性和行业空间。
     - 估值回落时，观察是否由一次性扰动还是长期逻辑变化导致。

  4. **价格确认**
     - 使用 `analyze_trend` 判断预期变化是否已经转化为趋势。
     - 放量突破可视为预期被资金确认；缩量反弹则更偏修复观察。
     - 高位放量滞涨、利好不涨或跌破关键支撑，可能意味着预期转弱。

  输出要求：
  - 明确当前是：正向预期差 / 预期兑现 / 负向预期差 / 预期不明。
  - 说明哪些信息改变了市场预期，哪些仍待验证。
  - 给出观察点：下一份财报、订单兑现、政策落地、估值回落或技术确认。

  评分调整建议：
  - 正向预期差且价格尚未充分反映：`sentiment_score +15`
  - 正向预期差已被连续大涨兑现：`sentiment_score -5`
  - 负向预期差或核心假设被证伪：`sentiment_score -15`
  - 信息不充分但存在潜在修复：维持中性并降低置信度

instructions_en: |
  **Expectation Repricing Strategy**

  Applicable Scenarios:
  - Market expectations are changing regarding the company's earnings, policy, industry prosperity, valuation center, or competitive landscape.
  - Need to determine whether the current price reflects "expectation repair," "expectation disappointment," or "expectation overheating."

  Analysis Framework:

  1. **Expectation Source**
     - Use `search_stock_news` to identify recent information that changed market expectations: earnings pre-announcements, institutional views, orders, policy, product progress, industry data.
     - Distinguish between hard information (announcements, financial reports, orders) and soft information (rumors, opinions, sentiment).

  2. **Expectation Gap Direction**
     - Positive expectation gap: Market was previously pessimistic, new information shows business or earnings better than expected.
     - Negative expectation gap: Market was previously optimistic, new information falls below expectations or verification fails.
     - If information has already been fully reflected by consecutive large gains, alert on expectation realization risk.

  3. **Valuation Repricing**
     - Use PE/PB, market cap, ROE, cash flow and other fields to judge whether valuation repricing is supported by fundamentals.
     - Valuation uplift needs to match earnings quality, growth sustainability, and industry space.
     - When valuation retreats, observe whether it's caused by one-off disturbances or long-term thesis changes.

  4. **Price Confirmation**
     - Use `analyze_trend` to determine if expectation changes have translated into a trend.
     - Volume breakout can be viewed as expectations confirmed by capital; shrinking volume bounce is more of a repair observation.
     - Volume expansion with price stagnation at highs, positive news without price rise, or breaking below key support may indicate weakening expectations.

  Output Requirements:
  - Clearly state the current situation: Positive expectation gap / Expectation realized / Negative expectation gap / Unclear expectations.
  - Explain which information changed market expectations and which remains to be verified.
  - Provide observation points: next earnings report, order realization, policy implementation, valuation retreat, or technical confirmation.

  Scoring Adjustment Suggestions:
  - Positive expectation gap with price not yet fully reflected: `sentiment_score +15`
  - Positive expectation gap already realized through consecutive large gains: `sentiment_score -5`
  - Negative expectation gap or core assumptions disproven: `sentiment_score -15`
  - Insufficient information but potential repair exists: maintain neutral and lower confidence
