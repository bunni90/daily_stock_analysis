# Expectation Repricing Strategy / 预期重估

name: expectation_repricing
display_name: 预期重估
display_name_en: "Expectation Repricing"
description: 分析业绩预期、政策预期和估值预期的变化，寻找预期差修复或预期过热后的回落风险。
description_en: "Analyzes changes in earnings, policy, and valuation expectations. Finds expectation gap repair or overheating reversal risks."
