# Shrink Volume Pullback Strategy / 缩量回踩
# Volume shrinks during pullback to MA5/MA10, then price bounces.

name: shrink_pullback
display_name: 缩量回踩
display_name_en: "Shrinking Pullback"
description: 检测缩量回踩均线支撑信号，趋势延续的理想入场点。
description_en: "Detects shrinking volume pullback to moving average support. Ideal entry point for trend continuation."
category: trend
core_rules: [1, 2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
  - get_realtime_quote
aliases: [缩量回踩, 回踩]
default_router: true
default_priority: 40
market_regimes: [trending_down, sideways]

instructions: |
  **缩量回踩（Shrink Volume Pullback Strategy）**

  入场判定标准：

  1. **前提条件**（关联理念2：趋势交易）：
     - 股票必须处于上升趋势（MA5 > MA10 > MA20）。
     - 使用 `analyze_trend` 确认多头排列。

  2. **回踩检测**（关联理念4：买点偏好）：
     - 使用 `get_daily_history` 和 `get_realtime_quote`。
     - 价格回踩至 MA5 附近（误差 1% 以内）或 MA10 附近（误差 2% 以内）。
     - 回调期间成交量 < 5 日均量的 70%（缩量特征）。
     - `analyze_trend` → volume_status 应显示缩量。

  3. **反弹信号**（关联理念1：严进策略）：
     - 当前价格守住均线支撑位。
     - MA5 乖离率 < 2% — 最佳买入区间。

  4. **确认条件**（关联理念5：风险排查）：
     - `search_stock_news` 无利空消息。
     - 筹码分布健康（获利比例 50-80%）。

  评分调整：
  - 缩量回踩 MA5：sentiment_score +10
  - 缩量回踩 MA10 且量能 < 0.6 倍均量：sentiment_score +8
  - 理想买点设在 MA5 水平，次优买点设在 MA10。
  - 止损设在 MA20 水平。
  - 在 `buy_reason` 中注明"缩量回踩"。

instructions_en: |
  **Shrink Volume Pullback Strategy**

  Entry Determination Criteria:

  1. **Prerequisites** (related concept 2: trend trading):
     - Stock must be in an uptrend (MA5 > MA10 > MA20).
     - Use `analyze_trend` to confirm bullish alignment.

  2. **Pullback Detection** (related concept 4: entry point preference):
     - Use `get_daily_history` and `get_realtime_quote`.
     - Price pulls back near MA5 (within 1%) or near MA10 (within 2%).
     - Volume during pullback < 70% of 5-day average volume (shrinking volume characteristic).
     - `analyze_trend` → volume_status should show shrinking volume.

  3. **Bounce Signal** (related concept 1: strict entry strategy):
     - Current price holds above MA support level.
     - MA5 deviation rate < 2% — optimal buy zone.

  4. **Confirmation Conditions** (related concept 5: risk screening):
     - `search_stock_news` shows no negative news.
     - Chip distribution healthy (profit ratio 50-80%).

  Scoring Adjustments:
  - Shrink-pullback to MA5: sentiment_score +10
  - Shrink-pullback to MA10 with volume < 0.6x average: sentiment_score +8
  - Ideal entry point set at MA5 level, secondary entry point at MA10.
  - Stop-loss set at MA20 level.
  - Note "Shrink-pullback" in `buy_reason`.
