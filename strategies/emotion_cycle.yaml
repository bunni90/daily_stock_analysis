instructions: |
  **情绪周期策略（Sentiment Cycle Strategy）**

  核心哲学：市场参与者的情绪在"恐慌→悲观→怀疑→希望→乐观→兴奋→贪婪→狂热"
  之间循环。聪明钱在恐慌底部布局，在狂热顶部离场。

  ## 情绪阶段量化指标

  ### 第一步：换手率分析（情绪热度核心指标）
  使用 `get_daily_history` 和 `get_realtime_quote`：

  - **换手率 < 0.5%/日**：市场冷淡，无人关注，潜在底部区域（贪婪时买入别人的恐慌）。
  - **换手率 0.5%~2%**：正常交投，情绪平稳。
  - **换手率 2%~5%**：活跃，市场开始关注，不宜追高。
  - **换手率 > 5%**：高热度，游资/散户涌入，警惕情绪顶。
  - **换手率 > 10%（日均）**：极度过热，通常为短期顶部。

  ### 第二步：连续换手率走势
  使用 `get_daily_history` 计算近 20 日换手率走势：
  - 由高向低（持续降温）+ 成交量萎缩 → 情绪退潮，耐心等待。
  - 由低向高（加速升温）+ 成交量陡增 → 情绪启动，可介入。
  - 突然单日暴量（换手率超过前期5倍）→ 往往是主力出货，需警惕。

  ### 第三步：新闻情绪面分析
  使用 `search_stock_news` 搜索近期新闻，分析情绪倾向：
  - 新闻集中出现"利好兑现、业绩超预期、涨停板、机构推荐"等 → 情绪可能过热。
  - 新闻集中出现"业绩下滑、利空、跌破支撑" → 悲观情绪可能造就底部。
  - 散户论坛/社交媒体情绪极端负面 → 反向指标，可能接近底部。

  ### 第四步：均线收缩与波动率
  使用 `analyze_trend`：
  - MA5/MA10/MA20 三线粘合（均线收缩）→ 蓄势，方向待定，情绪冷淡。
  - 波动率降至低位（ATR 萎缩）→ 情绪极度低迷，蓄势爆发前兆。

  ## 情绪底部特征（买入区）
  满足以下3项以上：
  ✅ 近20日換手率处于近一年低位
  ✅ 成交量持续萎缩，低于近60日均量50%以上
  ✅ 近期新闻以低调、中性或负面为主
  ✅ 股价在MA20附近或以下，但未出现恐慌性暴跌
  ✅ 机构持仓稳定或小幅增加（如有数据）

  ## 情绪顶部特征（减仓区）
  满足以下3项以上：
  ⚠️ 近5日换手率 > 近20日均值的2倍
  ⚠️ 成交量脉冲式放大（单日）
  ⚠️ 新闻以利好兑现、机构目标价大幅上调、散户追捧为主
  ⚠️ 股价偏离MA5超过8%（高乖离率）
  ⚠️ MACD 出现顶背离

  ## 输出要求
  - 当前情绪阶段判断：冷淡底部 / 平稳 / 升温介入 / 过热警惕 / 狂热顶部。
  - 当前换手率与近一年换手率均值对比。
  - 是否满足情绪底部或顶部特征（列出满足条项）。
  - 给出逆情绪操作建议（大众恐慌我贪婪，大众贪婪我谨慎）。

  评分调整建议：
  - 情绪底部特征满足3项以上：`sentiment_score +14`
  - 情绪底部特征满足全部5项：`sentiment_score +20`
  - 情绪顶部特征满足3项以上：`sentiment_score -12`
  - 情绪顶部特征满足全部5项：`sentiment_score -20`
  - 情绪平稳区间：不调整基础分

instructions_en: |
  **Sentiment Cycle Strategy**

  Core Philosophy: Market participant emotions cycle through "panic → pessimism → doubt → hope → optimism → excitement → greed → euphoria."
  Smart money positions at panic bottoms and exits at euphoric tops.

  ## Sentiment Stage Quantitative Indicators

  ### Step 1: Turnover Rate Analysis (Core Sentiment Heat Indicator)
  Use `get_daily_history` and `get_realtime_quote`:

  - **Turnover rate < 0.5%/day**: Market indifferent, no attention, potential bottom area (buy others' panic when greedy).
  - **Turnover rate 0.5%~2%**: Normal trading, sentiment stable.
  - **Turnover rate 2%~5%**: Active, market starting to pay attention, avoid chasing highs.
  - **Turnover rate > 5%**: High heat, hot money/retail flooding in, alert for sentiment top.
  - **Turnover rate > 10% (daily average)**: Extreme overheating, typically a short-term top.

  ### Step 2: Consecutive Turnover Rate Trend
  Use `get_daily_history` to calculate 20-day turnover rate trend:
  - High to low (sustained cooling) + volume shrinkage → sentiment retreating, wait patiently.
  - Low to high (accelerating warming) + volume surge → sentiment launching, can enter.
  - Sudden single-day massive volume (turnover rate exceeding 5x recent) → often institutional distribution, be alert.

  ### Step 3: News Sentiment Analysis
  Use `search_stock_news` to search recent news, analyze sentiment bias:
  - News concentrated with "positive realized, earnings beat, limit-up, institutional recommendation" → sentiment may be overheating.
  - News concentrated with "earnings decline, negative, breaking support" → pessimistic sentiment may create a bottom.
  - Retail forums/social media sentiment extremely negative → contrarian indicator, may be near bottom.

  ### Step 4: MA Contraction & Volatility
  Use `analyze_trend`:
  - MA5/MA10/MA20 three-line convergence (MA contraction) → accumulation, direction TBD, sentiment indifferent.
  - Volatility dropping to low levels (ATR shrinkage) → sentiment extremely depressed, precursor to breakout.

  ## Sentiment Bottom Characteristics (Buy Zone)
  Meeting 3 or more of the following:
  ✅ 20-day turnover rate at a near-1-year low
  ✅ Volume continuously shrinking, below 50% of 60-day average volume
  ✅ Recent news predominantly low-key, neutral, or negative
  ✅ Stock price at or below MA20, but no panic plunge
  ✅ Institutional holdings stable or slightly increasing (if data available)

  ## Sentiment Top Characteristics (Reduce Zone)
  Meeting 3 or more of the following:
  ⚠️ 5-day turnover rate > 2x the 20-day average
  ⚠️ Pulsing volume expansion (single day)
  ⚠️ News dominated by positive realization, institutional price target hikes, retail chasing
  ⚠️ Stock price deviating > 8% from MA5 (high deviation rate)
  ⚠️ MACD showing top divergence

  ## Output Requirements
  - Current sentiment stage assessment: Cold bottom / Stable / Warming entry / Overheat alert / Euphoric top.
  - Current turnover rate compared to 1-year average turnover rate.
  - Whether sentiment bottom or top characteristics are met (list satisfied conditions).
  - Provide contrarian-sentiment trade recommendations (be greedy when others are fearful, be cautious when others are greedy).

  Scoring Adjustment Suggestions:
  - Sentiment bottom characteristics meeting 3+ items: `sentiment_score +14`
  - Sentiment bottom characteristics meeting all 5 items: `sentiment_score +20`
  - Sentiment top characteristics meeting 3+ items: `sentiment_score -12`
  - Sentiment top characteristics meeting all 5 items: `sentiment_score -20`
  - Sentiment stable range: no adjustment to base score
