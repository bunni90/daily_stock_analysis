instructions: |
  **箱体震荡战法（Box Range Trading Strategy）**

  核心逻辑：箱体内部价格在阻力位与支撑位之间反复震荡，
  "贴着支撑买、接近阻力卖"，通过波段操作获取区间收益。

  ## 分析步骤

  ### 1. 箱体识别
  使用 `get_daily_history` 获取近 60~120 日数据：

  - **箱体顶部（阻力位）**：近期多次触碰但未有效突破的高点连线。
    通常为 20~60 日内3次以上的高点聚集区域。
  - **箱体底部（支撑位）**：近期多次下探但未有效跌破的低点连线。
  - 箱体有效性：顶部和底部各至少触碰 2~3 次方可确认。
  - 使用 `analyze_trend` 的 support_levels / resistance_levels 辅助定位。

  ### 2. 当前位置判断
  使用 `get_realtime_quote` 获取现价，与箱体边界对比：

  - **箱底区域**（距支撑 ≤5%）：买入/加仓信号，止损设箱底下方 3%。
  - **箱中区域**（箱体中间 1/3）：观望，不主动操作。
  - **箱顶区域**（距阻力 ≤5%）：减仓/止盈信号，无需追高。

  ### 3. 量能辅助判断
  - **箱底放量企稳**：支撑有效的强信号，可较重仓。
  - **箱顶缩量滞涨**：阻力有效的卖出信号。
  - **箱体突破（放量超过均量2倍以上）**：
    - 向上有效突破 → 转为多头趋势策略，新目标 = 箱体高度延伸。
    - 向下有效跌破 → 离场等待，原支撑转阻力。

  ### 4. 箱体宽度与预期收益
  - 计算箱体宽度：(顶部 - 底部) / 底部 × 100%。
  - 宽度 < 5%：操作空间过小，不建议参与。
  - 宽度 5%~15%：标准箱体，波段操作可行。
  - 宽度 > 15%：大箱体，可做更大波段。

  ### 5. 假突破识别
  - 单日盘中触及阻力/支撑后快速回撤，收盘回到箱内 → 假突破，维持箱体操作。
  - 连续两日收盘突破箱体边界，且量能放大 → 真突破，修改策略。

  ### 6. 输出要求
  - 明确给出箱体顶部价位和底部价位。
  - 当前价格所处区间（箱底/箱中/箱顶）。
  - 若价格已突破，说明突破方向及新目标。
  - 建议仓位与止损位。

  评分调整建议：
  - 箱底企稳 + 缩量：`sentiment_score +10`
  - 箱底放量攻顶：`sentiment_score +12`
  - 箱体向上有效突破：`sentiment_score +15，转趋势策略`
  - 处于箱顶区域：`sentiment_score -5（不追高）`
  - 箱底有效跌破：`sentiment_score -15，离场`

instructions_en: |
  **Box Range Trading Strategy**

  Core Logic: Within the box, price oscillates repeatedly between resistance and support.
  "Buy near support, sell near resistance" — capture range returns through swing trading.

  ## Analysis Steps

  ### 1. Box Identification
  Use `get_daily_history` to get 60~120 days of data:

  - **Box Top (Resistance)**: Line connecting recent highs that were touched multiple times but not decisively broken.
    Typically a cluster of 3+ highs within 20~60 days.
  - **Box Bottom (Support)**: Line connecting recent lows that were tested multiple times but not decisively broken.
  - Box validity: Top and bottom must each be touched at least 2~3 times for confirmation.
  - Use `analyze_trend` support_levels / resistance_levels to assist positioning.

  ### 2. Current Position Assessment
  Use `get_realtime_quote` to get current price and compare with box boundaries:

  - **Box Bottom Area** (within 5% of support): Buy/add signal, stop-loss set 3% below box bottom.
  - **Box Middle Area** (middle 1/3 of box): Watch, no active trading.
  - **Box Top Area** (within 5% of resistance): Reduce/take-profit signal, no chasing highs.

  ### 3. Volume-Assisted Judgment
  - **Volume surge stabilizing at box bottom**: Strong signal of valid support, can size up.
  - **Shrinking volume stagnation at box top**: Valid resistance sell signal.
  - **Box breakout (volume exceeding 2x average)**:
    - Valid upward breakout → switch to bull trend strategy, new target = box height extension.
    - Valid downward breakdown → exit and wait, former support becomes resistance.

  ### 4. Box Width & Expected Returns
  - Calculate box width: (Top - Bottom) / Bottom × 100%.
  - Width < 5%: Insufficient trading space, not recommended to participate.
  - Width 5%~15%: Standard box, swing trading feasible.
  - Width > 15%: Large box, larger swing trades possible.

  ### 5. False Breakout Identification
  - Single-day intraday touch of resistance/support followed by quick pullback, closing back inside the box → false breakout, maintain box trading.
  - Consecutive two-day close beyond box boundary with volume expansion → true breakout, modify strategy.

  ### 6. Output Requirements
  - Clearly provide box top and bottom price levels.
  - Current price zone (box bottom / box middle / box top).
  - If price has broken out, explain breakout direction and new target.
  - Recommended position size and stop-loss level.

  Scoring Adjustment Suggestions:
  - Box bottom stabilization + shrinking volume: `sentiment_score +10`
  - Box bottom volume surge attacking top: `sentiment_score +12`
  - Valid upward box breakout: `sentiment_score +15, switch to trend strategy`
  - In box top area: `sentiment_score -5 (no chasing highs)`
  - Valid downward break below box bottom: `sentiment_score -15, exit`
