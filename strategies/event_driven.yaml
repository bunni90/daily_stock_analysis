# Event Driven Strategy / 事件驱动

name: event_driven
display_name: 事件驱动
display_name_en: "Event Driven"
description: 围绕业绩、政策、并购、订单、产品发布等事件，评估催化强度、兑现概率和风险边界。
description_en: "Evaluates catalyst strength, realization probability, and risk boundaries around earnings, policy, M&A, orders, and product launches."
category: framework
core_rules: [3, 5]
