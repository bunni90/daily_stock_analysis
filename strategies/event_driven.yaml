instructions: |
  **事件驱动策略（Event Driven Strategy）**

  适用场景：
  - 公司或行业出现明确事件催化，如业绩预告、订单中标、并购重组、政策落地、产品发布、监管处罚、诉讼等。
  - 需要判断事件是短期交易催化、长期基本面改善，还是利好兑现。

  分析框架：

  1. **事件分类**
     - 使用 `search_stock_news` 梳理近期关键事件。
     - 将事件分为：业绩类、政策类、订单/产品类、资本运作类、监管/风险类。
     - 明确事件发生时间，过期或时间未知的信息不能作为主要依据。

  2. **影响路径**
     - 判断事件影响的是收入、利润率、估值、融资能力、市场份额，还是仅影响情绪。
     - 对重大订单或政策利好，要说明兑现周期和不确定性。
     - 对监管、减持、处罚、诉讼等事件，风险优先。

  3. **市场反应**
     - 使用 `get_realtime_quote` 和 `analyze_trend` 判断事件是否已被价格充分反映。
     - 放量上涨但未过关键阻力，可等待确认。
     - 高位放量滞涨或利好后冲高回落，应警惕兑现压力。

  4. **交易计划**
     - 事件未兑现前，强调仓位控制和时间窗口。
     - 事件兑现后，重新评估是否从“预期交易”切换为“业绩验证”。
     - 对负面事件，先看风险释放是否充分，再考虑反弹。

  输出要求：
  - 明确事件性质：利好 / 利空 / 中性 / 不确定。
  - 给出事件可信度、兑现周期、已反映程度。
  - 操作建议必须包含失效条件，如公告不及预期、跌破关键支撑或事件热度消退。

  评分调整建议：
  - 高可信正向事件且价格尚未充分反映：`sentiment_score +14`
  - 正向事件已大幅兑现：`sentiment_score -6`
  - 负面事件仍在发酵：`sentiment_score -15`
  - 事件影响不清晰或信息冲突：维持中性并降低置信度

instructions_en: |
  **Event Driven Strategy**

  Applicable Scenarios:
  - The company or industry has a clear event catalyst, such as earnings pre-announcement, winning bids, M&A restructuring, policy implementation, product launches, regulatory penalties, lawsuits, etc.
  - Need to determine whether the event is a short-term trading catalyst, long-term fundamental improvement, or already realized positive.

  Analysis Framework:

  1. **Event Classification**
     - Use `search_stock_news` to identify recent key events.
     - Classify events into: earnings, policy, orders/products, capital operations, regulatory/risk.
     - Clarify the event timing; expired or timing-unknown information cannot serve as the primary basis.

  2. **Impact Pathway**
     - Determine whether the event affects revenue, profit margin, valuation, financing capability, market share, or merely sentiment.
     - For major orders or policy positives, explain the realization timeline and uncertainty.
     - For regulatory, share reduction, penalty, or lawsuit events, prioritize risk.

  3. **Market Reaction**
     - Use `get_realtime_quote` and `analyze_trend` to determine if the event is already fully reflected in price.
     - Volume expansion rising but not past key resistance — wait for confirmation.
     - Volume expansion with price stagnation at highs or positive news followed by spike-and-reversal — be alert for realization pressure.

  4. **Trading Plan**
     - Before event realization, emphasize position control and time window.
     - After event realization, re-evaluate whether to switch from "expectation trading" to "earnings verification."
     - For negative events, first assess whether risk has been sufficiently released before considering a rebound.

  Output Requirements:
  - Clearly state event nature: Positive / Negative / Neutral / Uncertain.
  - Provide event credibility, realization timeline, and degree of price reflection.
  - Trade recommendations must include invalidation conditions, such as announcement below expectations, breaking below key support, or event momentum fading.

  Scoring Adjustment Suggestions:
  - High-confidence positive event with price not yet fully reflecting it: `sentiment_score +14`
  - Positive event already largely realized: `sentiment_score -6`
  - Negative event still unfolding: `sentiment_score -15`
  - Event impact unclear or conflicting information: maintain neutral and lower confidence
