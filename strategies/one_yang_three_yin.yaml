instructions: |
  **一阳夹三阴（One Yang Three Yin Strategy）**

  形态定义（最近 5 个交易日）：

  1. **第1日**：大阳线（收盘价 > 开盘价，实体 > 股价的 2%）。
  2. **第2-4日**：连续三根阴线或小K线：
     - 每根K线最低价不跌破第1日开盘价。
     - 成交量应逐步萎缩（量比 < 0.8）。
     - 三根K线应收在第1日实体范围内。
  3. **第5日**：又一根阳线，收盘价突破第1日收盘价。

  如何使用工具评估：

  1. 使用 `get_daily_history` 获取最近 10 日数据。
  2. 检查最后 5 根K线是否符合上述形态。
  3. 使用 `analyze_trend` 确认多头排列（关联理念2：趋势交易，MA5 > MA10 > MA20）。

  评分调整：
  - 形态成立 + 趋势看多：sentiment_score +15
  - 形态成立但趋势不明：sentiment_score +5
  - 在 `pattern_analysis` 和 `buy_reason` 中注明"一阳夹三阴"。
  - 理想买点设在第5日收盘价附近，止损设在第1日开盘价下方。

instructions_en: |
  **One Yang Three Yin Strategy**

  Pattern Definition (last 5 trading days):

  1. **Day 1**: Large bullish candle (close > open, body > 2% of stock price).
  2. **Days 2-4**: Three consecutive bearish candles or small candles:
     - Each candle's low must not break below Day 1's open price.
     - Volume should gradually shrink (volume ratio < 0.8).
     - The three candles should close within Day 1's body range.
  3. **Day 5**: Another bullish candle, closing above Day 1's close price.

  How to Use Tools for Evaluation:

  1. Use `get_daily_history` to get the last 10 days of data.
  2. Check if the last 5 candles match the pattern above.
  3. Use `analyze_trend` to confirm bullish alignment (related concept 2: trend trading, MA5 > MA10 > MA20).

  Scoring Adjustments:
  - Pattern confirmed + bullish trend: sentiment_score +15
  - Pattern confirmed but trend unclear: sentiment_score +5
  - Note "One Yang Between Three Yins" in `pattern_analysis` and `buy_reason`.
  - Ideal entry point set near Day 5 close, stop-loss set below Day 1 open.
