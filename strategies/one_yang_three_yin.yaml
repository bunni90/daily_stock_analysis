# One Yang Three Yin Strategy / 一阳夹三阴
# K-line pattern: bullish → 3 small bearish → bullish. Consolidation end signal.

name: one_yang_three_yin
display_name: 一阳夹三阴
display_name_en: "One Yang Three Yin"
description: 检测一阳夹三阴K线整理形态，趋势延续入场信号。
description_en: "Detects one bullish candle enclosing three bearish candles pattern. Trend continuation entry signal."
category: pattern
core_rules: [2, 4]
required_tools:
  - get_daily_history
  - analyze_trend
aliases: [一阳穿三阴, 一阳夹三阴]
